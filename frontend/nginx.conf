server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Allow local usage-export uploads (POST /api/data/import-file).
    # Must be >= backend IMPORT_MAX_UPLOAD_MB so the app-level cap stays
    # authoritative and returns a clean JSON 413 instead of nginx's HTML one.
    client_max_body_size 50m;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_request_buffering off;
    }

    location / {
        try_files $uri /index.html;
    }
}
