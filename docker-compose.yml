services:
  backend:
    build: ./backend
    env_file: .env
    environment:
      DB_PATH: /data/copilot.db
      CORS_ALLOW_ORIGINS: '["http://localhost:8080"]'
    volumes:
      # Host bind mount: the SQLite DB lives on the host and persists across
      # `docker compose down` / `down -v` / rebuilds. Override DATA_DIR in .env
      # to store it outside the repo (e.g. DATA_DIR=~/copilot-usage-data).
      - ${DATA_DIR:-./data}:/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
